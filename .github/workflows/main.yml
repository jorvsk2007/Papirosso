name: Despliegue Seguro
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Inyectar llaves
        run: |
          # El robot cambia el texto 'MARCA_PARA_LLAVES' por el script real
          sed -i "s|MARCA_PARA_LLAVES|<script>window.PROCESS_ENV={SUPABASE_URL:'${{ secrets.SUPABASE_URL }}',SUPABASE_KEY:'${{ secrets.SUPABASE_KEY }}'}</script>|g" index.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages # IMPORTANTE: La versión con llaves vive aquí
